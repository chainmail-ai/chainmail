  <text x="535" y="242" font-size="8" font-family="Helvetica,Arial,sans-serif" fill="#555">FIXED</text>
  <rect x="655" y="232" width="48.0" height="12" rx="2" fill="#22aa55" opacity="0.8"/>
  <text x="708.0" y="242" font-size="8" font-family="Helvetica,Arial,sans-serif" fill="#333" font-weight="bold">96%</text>
  <text x="535" y="264" font-size="8" font-family="Helvetica,Arial,sans-serif" fill="#555">NOT_AFFECTED</text>
  <rect x="655" y="254" width="46.5" height="12" rx="2" fill="#1a4a8a" opacity="0.8"/>
  <text x="706.5" y="264" font-size="8" font-family="Helvetica,Arial,sans-serif" fill="#333" font-weight="bold">93%</text>
  <text x="535" y="286" font-size="8" font-family="Helvetica,Arial,sans-serif" fill="#555">UNDER_INVESTIGATION</text>
  <rect x="655" y="276" width="34.0" height="12" rx="2" fill="#f0a040" opacity="0.8"/>
  <text x="694.0" y="286" font-size="8" font-family="Helvetica,Arial,sans-serif" fill="#333" font-weight="bold">68%</text>
  <text x="535" y="308" font-size="8" font-family="Helvetica,Arial,sans-serif" fill="#555">Overall</text>
  <rect x="655" y="298" width="43.5" height="12" rx="2" fill="#555" opacity="0.8"/>
  <text x="703.5" y="308" font-size="8" font-family="Helvetica,Arial,sans-serif" fill="#333" font-weight="bold">87%</text>
