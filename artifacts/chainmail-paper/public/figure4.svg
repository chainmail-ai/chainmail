      fill="#888" text-anchor="start">~15%  —  Requires analyst confirmation (conservative)</text>
  </g>
  <g>
    <rect x="30" y="320" width="130" height="20" rx="3" fill="#cc3333" opacity="0.9"/>
    <text x="95" y="334" font-size="8" font-family="Helvetica,Arial,sans-serif"
      fill="white" text-anchor="middle" font-weight="bold">AFFECTED</text>
    <text x="170" y="334" font-size="8" font-family="Helvetica,Arial,sans-serif"
