  </g>
  <g>
    <rect x="30" y="264" width="130" height="20" rx="3" fill="#1a4a8a" opacity="0.9"/>
    <text x="95" y="278" font-size="8" font-family="Helvetica,Arial,sans-serif"
      fill="white" text-anchor="middle" font-weight="bold">NOT_AFFECTED</text>
    <text x="170" y="278" font-size="8" font-family="Helvetica,Arial,sans-serif"
      fill="#888" text-anchor="start">~50%  —  Vulnerable code path unreachable or CVSS=PHYSICAL</text>
  </g>
  <g>
    <rect x="30" y="292" width="130" height="20" rx="3" fill="#f0a040" opacity="0.9"/>
    <text x="95" y="306" font-size="8" font-family="Helvetica,Arial,sans-serif"
